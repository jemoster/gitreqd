# GRD-DEVOPS-001: Run npm tests on pull requests. Results appear as status checks on the PR.
name: Tests
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
jobs:
  test:
    name: npm test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "25"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Run tests
        run: npm test
