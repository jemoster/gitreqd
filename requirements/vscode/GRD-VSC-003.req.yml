id: GRD-VSC-003
title: Requirement editor preview
description: |
  The VSCode extension shall provide a dedicated requirement preview webview.

  Launch mechanism — Editor title action (Preview button):
  The extension shall contribute a single icon in the top-right corner of the editor tab (editor/title contribution). When the user clicks this icon, the extension shall open the requirement preview webview in a side-by-side column (split view), so the user can edit YAML in the editor and see the rendered preview alongside.

  The button shall be shown when the active editor is a YAML file.

  The "Preview" view shall display an HTML representation of the requirement, rendered from the current YAML content. The preview shall show the requirement for the document for which the user opened the preview; when the user opens preview for another requirement file, that file's preview is shown (in the same or a separate panel).

  The HTML used in the "Preview" view shall share a common base structure, styling, and components with the HTML that is generated for the full requirements report, so that individual requirement previews are visually and structurally consistent with the full report output.

  When a user clicks on a "satisfies" link in the requirement YAML, the extension shall open the preview webview for the target requirement.
attributes:
  status: active
  rationale: |
    A split preview/YAML experience allows users to both directly edit the underlying requirement YAML and immediately see a rendered representation in a form consistent with exported reports. Sharing a common HTML base between the per-requirement preview and the full report minimizes duplication, reduces divergence in presentation, and ensures that what users see in the editor accurately reflects the generated documentation.
links:
  - satisfies: GRD-VSC-001

