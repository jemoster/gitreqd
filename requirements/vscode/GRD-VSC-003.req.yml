id: GRD-VSC-003
title: Requirement editor
description: |
  The VSCode extension shall provide a dedicated requirement editor webview.

  Launch mechanism — Editor title action (Editor button):
  The extension shall contribute a single icon in the top-right corner of the editor tab (editor/title contribution). When the user clicks this icon, the extension shall open the requirement editor webview in a side-by-side column (split view), so the user can edit YAML in the editor and see the rendered Editor alongside.

  The button shall be shown when the active editor is a YAML file.

  The "Editor" view shall display an HTML representation of the requirement, rendered from the current YAML content. The Editor shall show the requirement for the document for which the user opened the Editor; when the user opens Editor for another requirement file, that file's Editor is shown (in the same or a separate panel).

  The HTML used in the "Editor" view shall share a common base structure, styling, and components with the HTML that is generated for the full requirements report, so that individual requirement Editors are visually and structurally consistent with the full report output.

  When a user clicks on a "satisfies" link in the requirement YAML, the extension shall open the editor webview for the target requirement.
attributes:
  rationale: |
    A split Editor/YAML experience allows users to both directly edit the underlying requirement YAML and immediately see a rendered representation in a form consistent with exported reports. Sharing a common HTML base between the per-requirement Editor and the full report minimizes duplication, reduces divergence in presentation, and ensures that what users see in the editor accurately reflects the generated documentation.
  status: active
links:
  - satisfies: GRD-VSC-001
