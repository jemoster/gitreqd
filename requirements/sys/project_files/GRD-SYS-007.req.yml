id: GRD-SYS-007
title: Project filename conventions
description: |
  The project root shall contain a {{ :root_marker_filename }} file that configures where requirement files are discovered.

  The {{ :root_marker_filename }} file shall be valid YAML whose top-level document is a mapping.
  * The mapping shall contain a key `requirement_dirs` whose value is a list of directories to search for requirement files.
  * The `requirement_dirs` value shall be a sequence.
  * Each item in the `requirement_dirs` sequence shall be a non-empty string representing a directory path, relative to the project root.
  * An entry of exactly `.` shall denote the project root directory (the directory that contains the {{ :root_marker_filename }} file) and every subdirectory beneath it when discovering requirement files; discovery under that entry shall be recursive.
  * Duplicate directories after resolving paths shall result in an error.
  * When discovering requirement files, the tool shall search in the directories specified in the `requirement_dirs` sequence, in order.
  For example, a minimal {{ :root_marker_filename }} file might be:

  ```yaml
  requirement_dirs:
    - requirements
    - more-requirements/frontend
  ```

  A configuration that discovers requirements anywhere under the project root might be:

  ```yaml
  requirement_dirs:
    - .
  ```
attributes:
  rationale: |
    Explicit configuration of requirement directories makes discovery predictable and avoids coupling to ad-hoc filesystem layouts.
  status: active
links:
  - satisfies: GRD-SYS-002
parameters:
  directory_metadata_filename: reqs.yaml | reqs.yml
  requirement_file_extension: .req.yaml | .req.yml
  root_marker_filename: gitreqd.yaml | gitreqd.yml
