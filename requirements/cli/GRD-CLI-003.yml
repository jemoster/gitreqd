id: GRD-CLI-003
title: CLI project root discovery
description: |
  The CLI shall search for a {{ GRD-SYS-007:root_marker_filename }} starting at the current directory (or a given path), walking up the directory structure to locate the project root.
  * If no project root is found, the CLI shall exit with an error.
  * The CLI shall stop searching for a project root as soon as the first {{ GRD-SYS-007:root_marker_filename }} file is found.
attributes:
  status: active
  rationale: |
    Users need the CLI to reliably locate the correct project root before running validation or generating reports.
links:
  - satisfies: GRD-SYS-002
  - satisfies: GRD-SYS-003

